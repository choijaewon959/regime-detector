name: collect-data

on:
  workflow_dispatch:
    inputs:
      start:
        description: Start date in YYYY-MM-DD format
        required: true
        default: "2000-01-01"
      end:
        description: End date in YYYY-MM-DD format
        required: true
        default: "2026-06-30"
  schedule:
    - cron: "0 21 * * 5"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: pip install -e .

      - name: Collect raw market data
        run: python -m regime_detector collect --start "${{ github.event.inputs.start || '2000-01-01' }}" --end "${{ github.event.inputs.end || '2026-06-30' }}" --output-dir data/raw

      - name: Upload raw data artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-market-data
          path: data/raw
